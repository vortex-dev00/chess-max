<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tournament · Chess Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap" data-app hidden>
      <a href="/arena.html" class="subtle">← Arena</a>
      <div class="spread" style="margin-top:6px">
        <div>
          <h1 style="font-size:28px; margin:0" data-t-name>Tournament</h1>
          <div class="subtle" data-t-meta></div>
        </div>
        <div class="row" style="gap:8px" data-t-controls></div>
      </div>

      <div data-champion hidden></div>
      <div data-my-match hidden></div>

      <section class="card" style="margin-top:16px" data-open-card hidden>
        <h2 style="font-size:18px">Players</h2>
        <ul class="list" data-players></ul>
      </section>

      <section style="margin-top:16px" data-bracket-wrap hidden>
        <h2 style="font-size:18px">Bracket</h2>
        <div class="bracket" data-bracket></div>
      </section>

      <section class="card" style="margin-top:16px" data-standings-wrap hidden>
        <h2 style="font-size:18px">Standings</h2>
        <ul class="list" data-standings></ul>
      </section>

      <section style="margin-top:16px" data-rounds-wrap hidden>
        <h2 style="font-size:18px">Rounds</h2>
        <div data-rounds></div>
      </section>
    </main>

    <script type="module" src="/assets/tournament.js"></script>
  </body>
</html>
