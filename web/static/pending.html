<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Awaiting approval · Chess Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap">
      <div class="card center-narrow" style="text-align:center">
        <div style="font-size:46px; line-height:1">⏳</div>
        <h1 style="font-size:24px; margin-top:10px">You're almost in!</h1>
        <p class="muted" data-pending-msg>Your account is waiting for a coach or admin to approve it. You'll get access as soon as they do — this page will let you in automatically.</p>
        <div class="row" style="justify-content:center; margin-top:8px">
          <button class="btn sm" data-refresh>Check again</button>
          <button class="btn sm ghost" data-logout>Log out</button>
        </div>
      </div>
    </main>

    <script type="module" src="/assets/pending.js"></script>
  </body>
</html>
