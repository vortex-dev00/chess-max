<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Puzzle · Chess Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="/styles/board.css" />
  </head>
  <body>
    <header data-nav></header>
    <main class="wrap" style="max-width:560px">
      <div class="card" data-card hidden>
        <h1 style="font-size:26px; margin-bottom:2px" data-title></h1>
        <p class="muted" style="margin-top:0" data-desc></p>
        <p class="subtle" data-tomove></p>
        <div class="board-wrap" style="margin:12px 0"><div class="board" data-board></div></div>
        <div class="statusbar" data-feedback>Make your move.</div>
        <div class="reward" data-reward hidden></div>
        <div class="row" style="justify-content:center; margin-top:10px">
          <button class="btn sm" data-reset>Reset</button>
          <a class="btn sm ghost" href="/dashboard.html">Done</a>
        </div>
      </div>
      <div class="card center-narrow" data-err hidden style="text-align:center">
        <h2>Puzzle unavailable</h2><p class="muted" data-errmsg></p><a class="btn primary" href="/dashboard.html">Back</a>
      </div>
    </main>
    <script type="module" src="/assets/puzzle.js"></script>
  </body>
</html>
