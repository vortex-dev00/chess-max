<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Úloha · Šachy na Smetance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="/styles/board.css" />
  </head>
  <body>
    <header data-nav></header>
    <main class="wrap wide">
      <div class="puzzle-grid" data-card hidden>
        <div class="board-wrap"><div class="board" data-board></div></div>
        <div class="puzzle-side">
          <div>
            <h1 style="font-size:24px; margin-bottom:2px" data-title></h1>
            <p class="muted" style="margin-top:0" data-desc></p>
            <p class="subtle" data-tomove></p>
          </div>
          <div class="statusbar" data-feedback>Zahraj svůj tah.</div>
          <div class="reward" data-reward hidden></div>
          <div class="row">
            <button class="btn sm" data-reset>Restart</button>
            <a class="btn sm ghost" href="/dashboard.html">Hotovo</a>
          </div>
        </div>
      </div>
      <div class="card center-narrow" data-err hidden style="text-align:center">
        <h2>Úloha není dostupná</h2><p class="muted" data-errmsg></p><a class="btn primary" href="/dashboard.html">Zpět</a>
      </div>
    </main>
    <script type="module" src="/assets/puzzle.js"></script>
  </body>
</html>
