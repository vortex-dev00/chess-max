<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Můj přehled · Šachy na Smetance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="/styles/board.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap wide" data-app hidden>
      <div class="dash-hero">
        <h1 data-greeting>Ahoj!</h1>
        <a class="btn primary" href="/play.html">Hrát online</a>
      </div>

      <div class="dash-grid">
        <div class="stack">
          <section class="card">
            <h2 style="font-size:20px">Moje úkoly</h2>
            <ul class="list" data-tasks><li class="muted">Načítání…</li></ul>
          </section>

          <section class="card">
            <h2 style="font-size:20px">Moje tréninkové skupiny</h2>
            <ul class="list" data-groups><li class="muted">Načítání…</li></ul>
          </section>
        </div>

        <aside class="card dash-side">
          <h2 style="font-size:20px">Můj pokrok</h2>
          <div data-progress><p class="muted" style="margin:0">Načítání…</p></div>
        </aside>
      </div>
    </main>

    <script type="module" src="/assets/dashboard.js"></script>
  </body>
</html>
