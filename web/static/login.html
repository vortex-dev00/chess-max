<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in · Chess Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap">
      <div class="card center-narrow">
        <div class="row" style="margin-bottom:18px">
          <button class="btn sm" data-tab="login">Log in</button>
          <button class="btn sm ghost" data-tab="signup">Sign up</button>
        </div>
        <div data-msg></div>

        <form data-form="login">
          <label class="field"><span>Email</span><input type="email" name="email" autocomplete="email" required /></label>
          <label class="field"><span>Password</span><input type="password" name="password" autocomplete="current-password" required /></label>
          <button class="btn primary" style="width:100%">Log in</button>
        </form>

        <form data-form="signup" hidden>
          <label class="field"><span>Name</span><input name="name" autocomplete="name" required /></label>
          <label class="field"><span>Email</span><input type="email" name="email" autocomplete="email" required /></label>
          <label class="field"><span>Password (6+)</span><input type="password" name="password" minlength="6" autocomplete="new-password" required /></label>
          <button class="btn primary" style="width:100%">Create account</button>
          <p class="subtle" style="margin-top:10px">The first account becomes the club admin. After that, a coach or admin needs to approve your account before you can get in.</p>
        </form>
      </div>
    </main>

    <script type="module" src="/assets/login.js"></script>
  </body>
</html>
