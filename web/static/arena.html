<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aréna · Šachy na Smetance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap wide" data-app hidden>
      <div class="arena-hero">
        <div>
          <div class="subtle">Tvůj rating</div>
          <div class="elo-big" data-my-elo>—</div>
          <div data-my-rank class="subtle"></div>
        </div>
        <div>
          <h1 style="font-size:26px; margin-bottom:2px">Aréna</h1>
          <p class="muted" style="margin:0">Vyzvi ostatní hráče na hodnocené partie a posunuj se v žebříčku.</p>
        </div>
      </div>

      <div class="arena-grid">
        <div class="stack">
          <section class="card">
            <div class="spread">
              <h2 style="font-size:18px; margin:0">Turnaje</h2>
              <button class="btn primary sm" data-host hidden>+ Založit turnaj</button>
            </div>

            <div class="card" data-host-form hidden style="margin-top:12px; background:var(--panel-2)">
              <div class="grid two" style="margin-bottom:10px">
                <label class="field" style="margin:0"><span>Název</span><input data-t-name placeholder="Mistrovství klubu" /></label>
                <label class="field" style="margin:0"><span>Formát</span>
                  <select data-t-format>
                    <option value="knockout">Vyřazovací (pavouk)</option>
                    <option value="roundrobin">Kruhový systém (každý s každým)</option>
                    <option value="swiss">Švýcarský systém (podle skóre)</option>
                  </select>
                </label>
              </div>
              <label class="field" data-t-rounds-wrap hidden><span>Počet kol (švýcarský systém, volitelné)</span><input data-t-rounds type="number" min="1" max="15" placeholder="automaticky" /></label>
              <label class="field"><span>Kdo ho uvidí a může se přidat?</span>
                <select data-t-audience>
                  <option value="group">Konkrétní skupina</option>
                  <option value="kids">Konkrétní děti</option>
                  <option value="all">Všichni</option>
                </select>
              </label>
              <label class="field" data-t-group-wrap><span>Skupina</span><select data-t-group></select></label>
              <label class="field" data-t-kids-wrap hidden><span>Děti — vyber víc přes Ctrl/Cmd + klik</span><select data-t-kids multiple size="6"></select></label>
              <div class="row"><button class="btn primary sm" data-t-create>Vytvořit</button><button class="btn sm ghost" data-host-cancel>Zrušit</button></div>
            </div>

            <ul class="list" data-tournaments style="margin-top:12px"></ul>
          </section>

          <section class="card">
            <h2 style="font-size:18px">Žebříček</h2>
            <p class="subtle" style="margin-bottom:12px">Vyzvi kohokoli na hodnocenou partii.</p>
            <ul class="list" data-leaderboard></ul>
          </section>
        </div>

        <aside class="stack">
          <section class="card" data-challenges-card hidden>
            <h2 style="font-size:18px">Výzvy</h2>
            <div data-challenges></div>
          </section>

          <section class="card">
            <h2 style="font-size:18px">Tvé poslední partie</h2>
            <ul class="list" data-history></ul>
          </section>
        </aside>
      </div>
    </main>

    <script type="module" src="/assets/arena.js"></script>
  </body>
</html>
