<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play · Chess Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="/styles/board.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap">
      <!-- Lobby -->
      <section class="card play-lobby" data-lobby>
        <h1 style="font-size:30px; text-align:center">Play online</h1>
        <p class="subtle" style="text-align:center; margin-top:-6px">Two players, one board. Share the code to invite a friend.</p>
        <label class="field"><span>Your name</span><input data-name placeholder="Magnus" maxlength="24" /></label>
        <button class="btn primary" data-create style="width:100%">Create a game</button>
        <div class="divider">or join</div>
        <div class="row">
          <input data-code class="grow" placeholder="CODE" maxlength="4" style="text-transform:uppercase" />
          <button class="btn" data-join>Join</button>
        </div>
        <div data-lobby-err class="subtle" style="color:var(--bad); margin-top:10px"></div>
      </section>

      <!-- Game -->
      <section class="game hidden" data-game>
        <div class="board-wrap">
          <div class="spread" style="margin-bottom:10px">
            <span class="subtle">Room <span class="code-pill" data-room></span></span>
            <span class="subtle" data-turn-label></span>
          </div>
          <div class="board" data-board></div>

          <!-- Replay scrubber (replay mode only) -->
          <div class="replay-bar hidden" data-replay-bar>
            <button class="btn sm ghost" data-rp-first title="Start">⏮</button>
            <button class="btn sm ghost" data-rp-prev title="Previous">◀</button>
            <button class="btn sm" data-rp-play title="Play / pause">▶</button>
            <button class="btn sm ghost" data-rp-next title="Next">▶▶</button>
            <button class="btn sm ghost" data-rp-last title="End">⏭</button>
            <span class="subtle" data-rp-counter style="margin-left:auto"></span>
          </div>
        </div>

        <aside class="side">
          <div class="pcard" data-pcard-top><div class="pname"><strong data-top-name>—</strong><span class="tag" data-top-color></span></div></div>
          <div class="statusbar" data-status>Waiting…</div>
          <div class="pcard" data-pcard-bottom><div class="pname"><strong data-bottom-name>—</strong><span class="tag" data-bottom-color></span></div></div>

          <div class="row">
            <button class="btn sm danger hidden" data-resign>Resign</button>
            <button class="btn sm hidden" data-rematch>Rematch</button>
          </div>

          <div>
            <div class="subtle" style="margin-bottom:5px">Moves</div>
            <div class="moves" data-moves></div>
          </div>

          <div class="chat">
            <div class="subtle">Chat</div>
            <div class="chat-log" data-chat></div>
            <div class="row">
              <input data-chat-input class="grow" placeholder="Say something…" maxlength="300" />
              <button class="btn sm" data-chat-send>Send</button>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <!-- Game-over overlay -->
    <div class="overlay hidden" data-overlay>
      <div class="card">
        <h2 data-over-title>Game over</h2>
        <p class="muted" data-over-sub></p>
        <p data-over-elo class="over-elo" hidden></p>
        <div class="row" style="justify-content:center">
          <button class="btn primary" data-over-rematch>Rematch</button>
          <a class="btn ghost" href="/play.html">New game</a>
        </div>
      </div>
    </div>

    <script type="module" src="/assets/play.js"></script>
  </body>
</html>
