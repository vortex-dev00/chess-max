<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hra · Šachy na Smetance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="/styles/board.css" />
  </head>
  <body>
    <header data-nav></header>

    <main class="wrap">
      <!-- Lobby -->
      <div class="play-hero" data-lobby>
        <div class="mini-board" style="width:170px">
          <div class="ms light"><span class="mp b">♜</span></div><div class="ms dark"><span class="mp b">♞</span></div><div class="ms light"><span class="mp b">♝</span></div><div class="ms dark"><span class="mp b">♛</span></div><div class="ms light"><span class="mp b">♚</span></div><div class="ms dark"><span class="mp b">♝</span></div><div class="ms light"><span class="mp b">♞</span></div><div class="ms dark"><span class="mp b">♜</span></div>
          <div class="ms dark"><span class="mp b">♟</span></div><div class="ms light"><span class="mp b">♟</span></div><div class="ms dark"><span class="mp b">♟</span></div><div class="ms light"><span class="mp b">♟</span></div><div class="ms dark"><span class="mp b">♟</span></div><div class="ms light"><span class="mp b">♟</span></div><div class="ms dark"><span class="mp b">♟</span></div><div class="ms light"><span class="mp b">♟</span></div>
          <div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div>
          <div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div>
          <div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div>
          <div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div><div class="ms dark"></div><div class="ms light"></div>
          <div class="ms light"><span class="mp w">♟</span></div><div class="ms dark"><span class="mp w">♟</span></div><div class="ms light"><span class="mp w">♟</span></div><div class="ms dark"><span class="mp w">♟</span></div><div class="ms light"><span class="mp w">♟</span></div><div class="ms dark"><span class="mp w">♟</span></div><div class="ms light"><span class="mp w">♟</span></div><div class="ms dark"><span class="mp w">♟</span></div>
          <div class="ms dark"><span class="mp w">♜</span></div><div class="ms light"><span class="mp w">♞</span></div><div class="ms dark"><span class="mp w">♝</span></div><div class="ms light"><span class="mp w">♛</span></div><div class="ms dark"><span class="mp w">♚</span></div><div class="ms light"><span class="mp w">♝</span></div><div class="ms dark"><span class="mp w">♞</span></div><div class="ms light"><span class="mp w">♜</span></div>
        </div>
        <section class="card play-lobby">
          <h1 style="font-size:28px; text-align:center">Hrát online</h1>
          <p class="subtle" style="text-align:center; margin-top:-6px">Dva hráči, jedna šachovnice. Sdílej kód a pozvi kamaráda.</p>
          <label class="field"><span>Tvoje jméno</span><input data-name placeholder="Magnus" maxlength="24" /></label>
          <button class="btn primary" data-create style="width:100%">Vytvořit hru</button>
          <div class="divider">nebo se připoj</div>
          <div class="row">
            <input data-code class="grow" placeholder="KÓD" maxlength="4" style="text-transform:uppercase" />
            <button class="btn" data-join>Připojit se</button>
          </div>
          <div data-lobby-err class="subtle" style="color:var(--bad); margin-top:10px"></div>
        </section>
      </div>

      <!-- Game -->
      <section class="game hidden" data-game>
        <div class="board-wrap">
          <div class="spread" style="margin-bottom:10px">
            <span class="subtle">Místnost <span class="code-pill" data-room></span></span>
            <span class="subtle" data-turn-label></span>
          </div>
          <div class="board" data-board></div>

          <!-- Replay scrubber (replay mode only) -->
          <div class="replay-bar hidden" data-replay-bar>
            <button class="btn sm ghost" data-rp-first title="Začátek">⏮</button>
            <button class="btn sm ghost" data-rp-prev title="Předchozí">◀</button>
            <button class="btn sm" data-rp-play title="Přehrát / pauza">▶</button>
            <button class="btn sm ghost" data-rp-next title="Další">▶▶</button>
            <button class="btn sm ghost" data-rp-last title="Konec">⏭</button>
            <span class="subtle" data-rp-counter style="margin-left:auto"></span>
          </div>
        </div>

        <aside class="side">
          <div class="pcard" data-pcard-top><div class="pname"><strong data-top-name>—</strong><span class="tag" data-top-color></span></div></div>
          <div class="statusbar" data-status>Čeká se…</div>
          <div class="pcard" data-pcard-bottom><div class="pname"><strong data-bottom-name>—</strong><span class="tag" data-bottom-color></span></div></div>

          <div class="row">
            <button class="btn sm danger hidden" data-resign>Vzdát se</button>
            <button class="btn sm hidden" data-rematch>Odveta</button>
          </div>

          <div>
            <div class="subtle" style="margin-bottom:5px">Tahy</div>
            <div class="moves" data-moves></div>
          </div>

          <div class="chat">
            <div class="subtle">Chat</div>
            <div class="chat-log" data-chat></div>
            <div class="row">
              <input data-chat-input class="grow" placeholder="Napiš něco…" maxlength="300" />
              <button class="btn sm" data-chat-send>Odeslat</button>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <!-- Game-over overlay -->
    <div class="overlay hidden" data-overlay>
      <div class="card">
        <h2 data-over-title>Konec hry</h2>
        <p class="muted" data-over-sub></p>
        <p data-over-elo class="over-elo" hidden></p>
        <div class="row" style="justify-content:center">
          <button class="btn primary" data-over-rematch>Odveta</button>
          <a class="btn ghost" href="/play.html">Nová hra</a>
        </div>
      </div>
    </div>

    <script type="module" src="/assets/play.js"></script>
  </body>
</html>
